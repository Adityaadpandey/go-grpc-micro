worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Security: Hide Nginx version
    server_tokens off;

    # Rate Limiting (Memory Zones)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Timeouts to prevent Slowloris attacks
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Size limits to prevent massive payload attacks
    client_max_body_size 10M;

    upstream nextjs_frontend {
        server frontend:3000;
        keepalive 64;
    }

    server {
        listen 80;
        server_name localhost;

        # Apply connection limits to entire server
        limit_conn conn_limit 20;

        # General proxy settings (inherited by all locations)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Static assets – long cache, immutable
        # NOTE: add_header here repeats all security headers because nginx does NOT
        # inherit server-block add_header directives when a location has its own.
        location /_next/static/ {
            proxy_pass http://nextjs_frontend;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Frontend routes
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://nextjs_frontend;

            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Healthcheck Endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
        }

        # Deny access to hidden files/dotfiles
        location ~ /\. {
            deny all;
        }
    }
}
